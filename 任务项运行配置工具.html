<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务单元定义工具</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6fb;
            --panel-bg: #ffffff;
            --border: #e6ebf2;
            --text: #1f2329;
            --muted: #86909c;
            --primary: #1677ff;
            --primary-hover: #4096ff;
            --primary-soft: #e8f3ff;
            --success-text: #2f7c4d;
            --success-bg: #f6ffed;
            --success-border: #b7eb8f;
            --tag-bg: #f2f3f5;
            --tag-text: #4e5969;
            --radius: 14px;
            --shadow: 0 10px 32px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        button,
        select,
        input {
            font: inherit;
        }

        .app-wrapper {
            padding: 28px;
        }

        .page-title {
            margin: 0 0 16px;
            font-size: 28px;
            font-weight: 700;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(22, 32, 56, 0.04);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .filter-panel {
            margin-bottom: 16px;
            padding: 22px 24px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .panel-title {
            margin: 0 0 18px;
            font-size: 16px;
            font-weight: 600;
        }

        .filter-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-form {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            flex: 1 1 auto;
        }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 42px;
        }

        .form-item label {
            color: #4e5969;
            white-space: nowrap;
        }

        .form-item select {
            min-width: 220px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #d5dce8;
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .filter-actions .form-item select {
            min-width: 240px;
        }

        .form-item select:focus,
        .modal-body input[type="checkbox"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
        }

        button {
            height: 38px;
            padding: 0 18px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            cursor: pointer;
            transition: all 0.24s ease;
        }

        button:hover {
            border-color: #b8d7ff;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 8px 18px rgba(22, 119, 255, 0.22);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 12px 24px rgba(22, 119, 255, 0.26);
            transform: translateY(-1px);
        }

        .btn-default {
            border-color: #d6dce7;
            background: rgba(255, 255, 255, 0.82);
            color: #465264;
        }

        .btn-default:hover {
            border-color: #b7c9e5;
            background: #f7fbff;
        }

        /* 导入/导出按钮样式 */
        .btn-action {
            background: #1890ff;
            border: 1px solid #1890ff;
            color: #fff;
            box-shadow: 0 4px 10px rgba(22, 119, 255, 0.15);
            margin-right: 8px;
        }

        .btn-action:hover {
            background: #40a9ff;
            border-color: #40a9ff;
            transform: translateY(-1px);
        }

        .btn-link {
            padding: 0;
            height: auto;
            border: none;
            background: transparent;
            color: var(--primary);
        }

        .roster-panel {
            padding: 12px 24px 24px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .status-main {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .status-text {
            font-size: 15px;
            color: #4e5969;
            line-height: 1.4;
            padding-left: 2px;
        }

        .status-text:empty {
            display: none;
        }

        .status-tools {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 18px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .status-filters {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 18px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .status-action-btn {
            flex: 0 0 auto;
        }

        .inline-filter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #4e5969;
            font-size: 13px;
            white-space: nowrap;
        }

        .inline-filter label {
            color: #4e5969;
            font-size: 13px;
            white-space: nowrap;
        }

        .inline-filter select {
            min-width: 220px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #d5dce8;
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        #globalEnabledFilter {
            min-width: 136px;
        }

        #businessCategory {
            min-width: 220px;
        }

        .inline-filter select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
        }

        .message {
            min-height: 0;
            color: #1677c9;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .group-list {
            display: grid;
            gap: 14px;
        }

        .catalog-layout {
            display: block;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }

        .catalog-column {
            border-right: none;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .catalog-column:last-of-type {
            background: #fff;
        }

        .catalog-nav {
            padding: 18px 14px 20px 16px;
            background: #fff;
            box-shadow: none;
        }

        .catalog-tree-head {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 350px;
            padding: 12px 12px 12px 18px;
            border: 1px solid #e4ecf7;
            border-radius: 14px;
            background: linear-gradient(135deg, #f8fbff 0%, #eef5ff 100%);
            box-shadow: 0 8px 22px rgba(22, 119, 255, 0.08);
        }

        .catalog-tree-head-title,
        .catalog-tree-head-status {
            color: #1d3f72;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .catalog-tree-head-title {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            min-width: 0;
            padding-left: 15px;
        }

        .catalog-tree-head-title::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1677ff 0%, #69a7ff 100%);
            box-shadow: 0 0 0 5px rgba(22, 119, 255, 0.12);
            flex: 0 0 auto;
        }

        .catalog-tree-head-status {
            justify-self: start;
            padding: 6px 12px;
            border-radius: 999px;
            background: transparent;
            color: #245ea8;
        }

        .catalog-tree {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .catalog-tree-node {
            position: relative;
            padding-bottom: 2px;
        }

        .catalog-tree-node::before {
            content: "";
            position: absolute;
            left: 20px;
            top: 18px;
            bottom: -8px;
            width: 1px;
            background: #d6deea;
            z-index: 0;
        }

        .catalog-tree-node:last-child::before {
            bottom: 30px;
        }

        .catalog-tree-node-row {
            position: relative;
            display: flex;
            align-items: flex-start;
            min-height: 40px;
            border-radius: 10px;
            transition: background 0.2s ease;
        }

        .catalog-tree-node.active .catalog-tree-node-row {
            background: #e7f1ff;
            box-shadow: inset 3px 0 0 #7da7df;
        }

        .catalog-tree-node.disabled.active .catalog-tree-node-row {
            background: #f2f5f9;
            box-shadow: inset 3px 0 0 #b7c7dc;
        }

        .catalog-tree-node-main {
            min-width: 0;
            display: flex;
            align-items: center;
            column-gap: 12px;
            flex: 1 1 auto;
            width: 100%;
            max-width: 350px;
            position: relative;
        }

        .catalog-tree-node-main::after {
            content: "";
            position: absolute;
            left: 20px;
            top: 50%;
            width: 12px;
            height: 1px;
            background: #d6deea;
            z-index: 1;
        }

        .catalog-tree-node-btn {
            position: relative;
            width: 100%;
            min-width: 0;
            display: flex;
            align-items: flex-start;
            min-height: 34px;
            padding: 2px 12px 0 0;
            border: none;
            background: transparent;
            color: #1d2129;
            text-align: left;
        }

        .catalog-tree-node-btn:hover .catalog-tree-node-text {
            color: var(--text);
        }

        .catalog-tree-node.active::before,
        .catalog-tree-node.active .catalog-tree-children::before {
            background: #d6deea;
        }

        .catalog-tree-node-text {
            display: flex;
            align-items: flex-start;
            min-height: 28px;
            padding: 7px 12px;
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            line-height: 1.45;
            transition: all 0.2s ease;
            white-space: normal;
            word-break: break-word;
            position: relative;
            z-index: 2;
            background: #fff;
        }

        .catalog-tree-node.active .catalog-tree-node-text {
            background: transparent;
            color: #1f4f8f;
        }

        .catalog-tree-node.disabled .catalog-tree-node-text {
            color: #b7c0cc;
            background: transparent;
            text-decoration: line-through;
            opacity: 0.8;
        }

        .catalog-tree-node.disabled.active .catalog-tree-node-text {
            background: transparent;
            color: #8b97a6;
            text-decoration: line-through;
        }

        .catalog-tree-children {
            position: relative;
            margin-left: 44px;
            margin-top: 8px;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .catalog-tree-children::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 8px;
            width: 1px;
            background: #d6deea;
            z-index: 0;
        }

        .node-toggle-checkbox {
            width: 20px;
            height: 20px;
            margin-left: 10px;
            flex: 0 0 auto;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            border: 1.5px solid #b7c3d4;
            border-radius: 4px;
            background: #fff;
            position: relative;
            z-index: 2;
            transition: all 0.2s ease;
            box-shadow: 0 0 0 4px #fff;
            outline: none;
        }

        .node-toggle-checkbox:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px #fff, 0 2px 6px rgba(22, 119, 255, 0.15);
        }

        .node-toggle-checkbox:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .node-toggle-checkbox:checked::after {
            content: "";
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .catalog-tree-node.disabled .node-toggle-checkbox {
            border-color: #c8d0db;
            background: #f7f9fc;
        }

        .catalog-tree-node.disabled .node-toggle-checkbox:hover {
            border-color: var(--primary);
            background: #fff;
        }

        .catalog-tree-node.active .node-toggle-checkbox {
            box-shadow: 0 0 0 4px #e7f1ff;
        }

        .catalog-tree-item {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 30px;
            padding: 6px 12px 6px 22px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            text-align: left;
            font-size: 13px;
            line-height: 1.45;
            transition: all 0.2s ease;
        }

        .catalog-tree-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 14px;
            height: 1px;
            background: #d6deea;
        }

        .catalog-tree-item::after {
            content: "";
            position: absolute;
            left: -4px;
            top: calc(50% - 4px);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #c1cad7;
        }

        .catalog-tree-item:hover {
            background: #f5f9ff;
            color: #335f99;
        }

        .catalog-tree-item.active {
            background: #f2f7ff;
            color: #1f4f8f;
            font-weight: 600;
            box-shadow: inset 3px 0 0 #bfd4f3;
        }

        .catalog-tree-item.active::after {
            background: #6f97cd;
        }

        .catalog-tree-branch {
            display: grid;
            gap: 8px;
        }

        .catalog-tree-detail {
            margin-left: 22px;
            padding: 4px 0 12px 18px;
            border-left: 1px solid #d6deea;
        }

        .catalog-tree-detail-title {
            margin-bottom: 10px;
            color: #4e5969;
            font-size: 13px;
            font-weight: 600;
        }

        .catalog-tree-detail .catalog-disabled-tip {
            margin: 0 0 12px;
        }

        .catalog-tree-detail .table-wrap {
            max-width: 100%;
        }

        .catalog-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #fcfdff 0%, #f7faff 100%);
        }

        .catalog-detail-title {
            color: #1d2129;
            font-size: 14px;
            font-weight: 600;
        }

        .catalog-tree-control-btn {
            height: 34px;
            padding: 0 12px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            background: #fff;
            color: #1f4f8f;
            font-size: 12px;
            white-space: nowrap;
        }

        .catalog-tree-control-btn:hover {
            border-color: #a9c2e6;
            background: #f5faff;
        }

        .catalog-detail-subtitle {
            color: #86909c;
            font-size: 12px;
        }

        .catalog-content {
            min-width: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .catalog-detail {
            padding: 16px;
            background: #f7faff;
        }

        .catalog-disabled-tip {
            margin: 12px 12px 0;
            padding: 10px 12px;
            border: 1px solid #e6ebf2;
            border-radius: 8px;
            background: #f7f9fc;
            color: #5f6b7a;
            font-size: 13px;
            line-height: 1.5;
        }

        .catalog-detail .table-wrap {
            border: 1px solid #e8edf5;
            border-radius: 12px;
            overflow: auto;
            background: #fff;
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.04);
            max-height: calc(100vh - 290px);
        }

        .catalog-tree-detail .table-wrap {
            border: 1px solid #e8edf5;
            border-radius: 12px;
            overflow: auto;
            background: #fff;
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.04);
            max-height: none;
        }

        .group-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .group-toggle {
            width: 100%;
            height: auto;
            padding: 16px 18px;
            border: none;
            border-bottom: 1px solid transparent;
            border-radius: 0;
            background: #fafcff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            text-align: left;
        }

        .group-toggle:hover {
            border-color: transparent;
            background: #f5faff;
        }

        .group-toggle.expanded {
            border-bottom-color: var(--border);
        }

        .group-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .group-arrow {
            display: inline-flex;
            width: 20px;
            justify-content: center;
            color: #4e5969;
            font-size: 14px;
        }

        .group-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .group-meta {
            color: var(--muted);
            font-size: 13px;
        }

        .group-filter-option {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4e5969;
            font-size: 13px;
            white-space: nowrap;
        }

        .group-header-right {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            white-space: nowrap;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid transparent;
            border-radius: 50%;
            background: #f0f6ff;
            color: var(--primary);
            box-shadow: inset 0 0 0 1px rgba(22, 119, 255, 0.06);
        }

        .icon-button:hover {
            border-color: #cfe2ff;
            color: var(--primary-hover);
            background: #e3f0ff;
            box-shadow: 0 8px 18px rgba(22, 119, 255, 0.16);
            transform: translateY(-1px);
        }

        .icon-button:disabled {
            border-color: #e5e8ef;
            background: #f5f7fa;
            color: #b7c0cc;
            cursor: not-allowed;
        }

        .icon-button:disabled:hover {
            border-color: #e5e8ef;
            background: #f5f7fa;
            color: #b7c0cc;
        }

        .icon-button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            table-layout: fixed;
        }

        th,
        td {
            padding: 18px 16px;
            border-bottom: 1px solid #eef2f7;
            text-align: left;
            font-size: 14px;
            vertical-align: middle;
            word-break: break-word;
            line-height: 1.8;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: linear-gradient(180deg, #f9fbff 0%, #f1f6ff 100%);
            color: #315b93;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.6px;
            border-bottom: 2px solid #dfe8f5;
        }

        tbody tr:hover {
            background: #f4f8ff;
        }

        tbody tr:nth-child(even) {
            background: #fcfdff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .index-cell {
            width: 72px;
            white-space: nowrap;
            text-align: center;
            color: #86909c;
        }

        .object-cell {
            width: 180px;
            white-space: nowrap;
        }

        .actions-cell {
            width: 88px;
            white-space: nowrap;
            text-align: center;
        }

        /* Switch Styling */
        .ant-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
            background-color: rgba(0, 0, 0, 0.25);
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
            vertical-align: middle;
            outline: none;
        }

        .ant-switch[aria-checked="true"] {
            background-color: #1890ff;
        }

        .ant-switch-handle {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background-color: #fff;
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(0, 35, 11, 0.2);
        }

        .ant-switch[aria-checked="true"] .ant-switch-handle {
            left: 24px;
        }

        .usage-cell {
            width: 120px;
            text-align: center !important;
        }

        .usage-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 3px 10px;
            border-radius: 999px;
            background: #eef5ff;
            border: 1px solid #d6e7ff;
            color: #3d5b8a;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .tag-withdraw {
            background: #effbf4;
            border-color: #c7efd6;
            color: #2f7c4d;
        }

        .tag-loan {
            background: #f4efff;
            border-color: #d8c8ff;
            color: #6b46c1;
        }

        .tag-manage {
            background: #eef5ff;
            border-color: #d6e7ff;
            color: #2f5fa7;
        }

        .usage-empty {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 2px 10px;
            border-radius: 999px;
            background: #f2f3f5;
            color: #9aa4b2;
            font-size: 12px;
        }

        .template-selector {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-left: auto;
        }

        .template-label {
            font-weight: 600;
            color: #1d2129;
            font-size: 14px;
        }

        .template-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }

        .template-btn {
            height: 28px;
            padding: 0 12px;
            border: 1px solid #d5dce8;
            border-radius: 6px;
            background: #fff;
            color: #4e5969;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .template-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-soft);
        }

        .template-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            font-weight: 500;
        }

        .template-btn.add-btn {
            padding: 0 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            border-style: dashed;
        }

        .template-btn.add-btn:hover {
            background: var(--primary-soft);
        }

        .template-btn.add-btn:disabled {
            border-color: #dce5f2;
            background: #f8fafc;
            color: #9aa8bd;
            cursor: not-allowed;
        }

        .template-name-input {
            width: 130px;
            height: 28px;
            padding: 0 10px;
            border: 1px solid var(--primary);
            border-radius: 6px;
            background: #fff;
            color: #1f2329;
            font-size: 13px;
            outline: none;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }

        .template-delete-confirm {
            border-color: #ffb4a8;
            background: #fff7f6;
            color: #ad2b1f;
            cursor: default;
        }

        .template-delete-confirm.active {
            border-color: #ffb4a8;
            background: #fff7f6;
            color: #ad2b1f;
        }

        .template-confirm-actions {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .tpl-confirm-btn {
            min-height: 22px;
            padding: 0 8px;
            border: 1px solid #d6dce7;
            border-radius: 6px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        .tpl-confirm-danger {
            border-color: #ff8f83;
            background: #fff1ef;
            color: #b42318;
        }

        .tpl-confirm-danger:hover {
            border-color: #f04438;
            background: #ffe7e3;
        }

        .tpl-confirm-cancel {
            color: #53627a;
        }

        .tpl-confirm-cancel:hover {
            border-color: #aab6c8;
            background: #f7f9fc;
        }

        .template-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .template-btn:hover .template-actions {
            opacity: 1;
        }

        .tpl-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            padding: 0;
        }

        .template-btn.active .tpl-action-btn {
            color: rgba(255, 255, 255, 0.85);
        }

        .template-btn:not(.active) .tpl-action-btn {
            color: #86909c;
        }

        .tpl-action-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--primary) !important;
        }

        .template-btn.active .tpl-action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff !important;
        }

        .section-hidden {
            display: none !important;
        }

        .description-text {
            white-space: pre-line;
            line-height: 1.7;
        }

        .empty-state {
            padding: 56px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        }

        .empty-state::before {
            content: "";
            display: block;
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            border-radius: 20px;
            background: radial-gradient(circle at 50% 28%, #dbe9ff 0 8px, transparent 9px), linear-gradient(180deg, #eef5ff 0%, #f7fbff 100%);
            box-shadow: inset 0 0 0 1px #dfeafb;
        }

        .table-empty-state {
            display: grid;
            justify-items: center;
            gap: 8px;
            padding: 20px 0;
            color: #7b8797;
        }

        .table-empty-state::before {
            content: "";
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: linear-gradient(180deg, #f2f7ff 0%, #fbfdff 100%);
            box-shadow: inset 0 0 0 1px #deebff, 0 8px 18px rgba(22, 119, 255, 0.08);
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.38);
            backdrop-filter: blur(4px);
            padding: 40px 20px 24px;
            overflow-y: auto;
        }

        .modal-mask.open {
            display: flex;
        }

        .modal {
            width: min(860px, 100%);
            background: #fff;
            border-radius: 18px;
            border: 1px solid rgba(219, 231, 255, 0.9);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
            overflow: visible;
        }

        .modal-header,
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header {
            background: linear-gradient(180deg, #f5f9ff 0%, #eef5ff 100%);
        }

        .modal-footer {
            border-bottom: none;
            border-top: 1px solid var(--border);
            justify-content: flex-end;
            background: #fbfcff;
        }

        .modal-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #1d3f72;
        }

        .modal-body {
            padding: 22px;
            overflow: visible;
        }

        .modal-tip {
            margin: 0 0 16px;
            color: #4e5969;
            font-size: 14px;
            line-height: 1.6;
        }

        .config-target {
            margin-bottom: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e0ebff;
            background: linear-gradient(180deg, #f7fbff 0%, #f2f7ff 100%);
            color: #1d2129;
            font-size: 14px;
            line-height: 1.6;
        }

        .modal-section {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .modal-section-title {
            margin: 0 0 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1d2129;
        }

        .param-form-item {
            display: grid;
            gap: 8px;
            max-width: 420px;
        }

        .param-form-item label {
            color: #4e5969;
            font-size: 14px;
        }

        .multi-select {
            position: relative;
        }

        .multi-select-trigger {
            width: 100%;
            height: 36px;
            padding: 0 38px 0 12px;
            border: 1px solid #cfd3dc;
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .multi-select-trigger:hover {
            border-color: #b8d7ff;
        }

        .multi-select-trigger::after {
            content: "▼";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 12px;
            pointer-events: none;
        }

        .multi-select.open .multi-select-trigger {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
        }

        .multi-select-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 30;
            display: none;
            padding: 8px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            max-height: 220px;
            overflow-y: auto;
        }

        .multi-select.open .multi-select-panel {
            display: block;
        }

        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 6px 8px;
            border-radius: 6px;
            color: #1d2129;
        }

        .multi-select-option:hover {
            background: #f5faff;
        }

        .param-group-list {
            display: grid;
            gap: 14px;
        }

        .param-group-card {
            position: relative;
            padding: 18px;
            border: 1px solid #e7edf6;
            border-radius: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
            overflow: visible;
        }

        .param-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .param-group-title {
            font-size: 14px;
            font-weight: 600;
            color: #1d2129;
        }

        .param-group-result {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            max-width: 420px;
        }

        .param-group-result label {
            color: #4e5969;
            font-size: 14px;
        }

        .param-result-input {
            width: 100%;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            color: #1d2129;
        }

        .param-add-button {
            margin-top: 14px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(160px, 1fr));
            gap: 12px 16px;
        }

        .checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 10px 12px;
            border: 1px solid #e5eaf2;
            border-radius: 10px;
            background: #fafcff;
        }

        .checkbox-grid label:hover {
            border-color: #b8d7ff;
            background: #f5faff;
        }

        @media (max-width: 960px) {
            .checkbox-grid {
                grid-template-columns: repeat(2, minmax(160px, 1fr));
            }

            .catalog-layout {
                grid-template-columns: 240px minmax(0, 1fr);
            }
        }

        @media (max-width: 720px) {

            .filter-layout,
            .filter-form,
            .filter-actions,
            .form-item,
            .status-main,
            .status-tools,
            .status-filters,
            .inline-filter {
                flex-direction: column;
                align-items: stretch;
            }

            .form-item select,
            .filter-form button,
            .inline-filter select {
                width: 100%;
                min-width: 0;
            }

            .catalog-tree-node-main {
                max-width: none;
            }

            .catalog-tree-head {
                grid-template-columns: 1fr;
                row-gap: 10px;
                padding-left: 18px;
            }

            .catalog-tree-head-status {
                justify-self: start;
            }

            .status-action-btn {
                width: 100%;
            }

            .checkbox-grid {
                grid-template-columns: 1fr;
            }

            .catalog-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .catalog-column {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .group-toggle {
                align-items: flex-start;
            }

            .usage-cell {
                width: 240px;
            }
        }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <h1 class="page-title">任务单元定义工具</h1>

        <section class="panel filter-panel">
            <div class="filter-layout">
                <div class="filter-form">
                    <div class="form-item">
                        <select id="relatedParty" name="relatedParty">
                            <option value="">业务关联方</option>
                            <option value="person">缴存人</option>
                            <option value="unit">缴存单位</option>
                            <option value="developer">开发商</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <select id="taskUnit" name="taskUnit">
                            <option value="">任务单元</option>
                        </select>
                    </div>
                    <button id="searchBtn" hidden class="btn-primary" type="button">查询</button>
                </div>
                <div class="filter-actions">
                    <button id="toggleAllCatalogNodesBtn" class="catalog-tree-control-btn status-action-btn"
                        type="button">展开</button>
                    <div class="inline-filter" style="display: none;">
                        <select id="globalEnabledFilter" name="globalEnabledFilter" aria-label="节点启停">
                            <option value="">节点启停</option>
                            <option value="enabled">启用</option>
                            <option value="disabled">停用</option>
                        </select>
                    </div>
                    <div class="inline-filter">
                        <select id="businessCategory" name="businessCategory" aria-label="应用任务项"></select>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel roster-panel">
            <div class="status-bar">
                <div id="totalText" class="status-text">共 0 个算法，0 条内容</div>
                <div class="template-selector">
                    <button id="importBtn" class="btn-action" type="button">导入</button>
                    <button id="exportBtn" class="btn-action" type="button">导出</button>
                    <button id="saveGlobalBtn" class="btn-primary"
                        style="margin-right: 20px; background: #d9d9d9; border-color: #d9d9d9; color: #fff; cursor: not-allowed;"
                        disabled>保存</button>
                    <span class="template-label">模板：</span>
                    <div id="templateList" class="template-list"></div>
                </div>
            </div>
            <div class="status-tools">
                <div id="messageBox" class="message"></div>
            </div>
            <div id="groupContainer" class="group-list"></div>
        </section>
    </div>

    <div id="businessConfigModalMask" class="modal-mask" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="businessConfigTitle">
            <div class="modal-header">
                <h3 id="businessConfigTitle" class="modal-title">配置应用业务</h3>
                <button id="closeBusinessConfigBtn" class="btn-default" type="button">关闭</button>
            </div>
            <div class="modal-body">
                <p class="modal-tip" style="display: none;">请选择当前清册内容需要应用到哪些业务；如果一个业务都不选，则该内容视为未使用。</p>
                <div id="configTargetText" class="config-target"></div>
                <div id="businessOptionList" class="checkbox-grid" style="display: none;"></div>
                <div id="algorithmParamSection" class="modal-section">
                    <h4 class="modal-section-title">算法参数配置</h4>
                    <div id="algorithmParamGroupList" class="param-group-list"></div>
                    <button id="addParamGroupBtn" class="btn-default param-add-button" type="button">+ 新增</button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelBusinessConfigBtn" class="btn-default" type="button">取消</button>
                <button id="confirmBusinessConfigBtn" class="btn-primary" type="button">确认</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            let templates = [
                { id: "tpl-1", name: "统建版" },
                { id: "tpl-2", name: "省会版" },
                { id: "tpl-3", name: "地级市版" },
                { id: "tpl-4", name: "行业版" },
                { id: "tpl-5", name: "基础贯标版" }
            ];
            let activeTemplateId = "tpl-1";
            let isAddingTemplate = false;
            let newTemplateName = "";
            let editingTemplateId = "";
            let editingTemplateName = "";
            let deletingTemplateId = "";
            let isDirty = false;
            const markdownApiUrl = "/api/config-md";
            let currentMarkdownVersion = "";

            function markDirty() {
                isDirty = true;
                const saveGlobalBtn = document.getElementById("saveGlobalBtn");
                if (saveGlobalBtn) {
                    saveGlobalBtn.disabled = false;
                    saveGlobalBtn.style.background = "#1890ff";
                    saveGlobalBtn.style.borderColor = "#1890ff";
                    saveGlobalBtn.style.cursor = "pointer";
                }
            }

            function markClean() {
                isDirty = false;
                const saveGlobalBtn = document.getElementById("saveGlobalBtn");
                if (saveGlobalBtn) {
                    saveGlobalBtn.disabled = true;
                    saveGlobalBtn.style.background = "#d9d9d9";
                    saveGlobalBtn.style.borderColor = "#d9d9d9";
                    saveGlobalBtn.style.cursor = "not-allowed";
                }
            }

            async function saveGlobal() {
                try {
                    await saveMarkdownContent(buildMarkdownContent(), currentMarkdownVersion, "配置已保存到 Markdown 数据源");
                } catch (err) {
                    handleMarkdownError(err, "保存失败");
                }
            }

            function renderTemplates() {
                const templateList = document.getElementById("templateList");
                if (!templateList) return;

                const html = templates.map(function (tpl) {
                    const isActive = tpl.id === activeTemplateId ? " active" : "";
                    if (editingTemplateId === tpl.id) {
                        return [
                            '<input class="template-name-input template-rename-input" type="text"',
                            ' data-template-mode="rename"',
                            ' data-tpl-id="' + escapeHtml(tpl.id) + '"',
                            ' value="' + escapeHtml(editingTemplateName) + '"',
                            ' aria-label="重命名模板">'
                        ].join("");
                    }
                    if (deletingTemplateId === tpl.id) {
                        return [
                            '<div class="template-btn template-delete-confirm' + isActive + '" data-tpl-id="' + escapeHtml(tpl.id) + '">',
                            '<span class="tpl-name">' + escapeHtml(tpl.name) + '</span>',
                            '<span class="template-confirm-actions">',
                            '<button class="tpl-confirm-btn tpl-confirm-danger" type="button" data-action="confirm-delete-template" data-tpl-id="' + escapeHtml(tpl.id) + '">删除</button>',
                            '<button class="tpl-confirm-btn tpl-confirm-cancel" type="button" data-action="cancel-delete-template">取消</button>',
                            '</span>',
                            '</div>'
                        ].join("");
                    }
                    return [
                        '<button class="template-btn' + isActive + '" type="button" data-action="select-template" data-tpl-id="' + escapeHtml(tpl.id) + '">',
                        '<span class="tpl-name">' + escapeHtml(tpl.name) + '</span>',
                        '<div class="template-actions">',
                        '<span class="tpl-action-btn" data-action="edit-template" data-tpl-id="' + escapeHtml(tpl.id) + '" title="重命名">✎</span>',
                        '<span class="tpl-action-btn" data-action="delete-template" data-tpl-id="' + escapeHtml(tpl.id) + '" title="删除">✖</span>',
                        '</div>',
                        '</button>'
                    ].join("");
                }).join("");

                const addInput = isAddingTemplate
                    ? '<input class="template-name-input template-add-input" type="text" data-template-mode="add" value="' + escapeHtml(newTemplateName) + '" placeholder="模板名称" aria-label="新增模板名称">'
                    : "";
                const addDisabled = isAddingTemplate || editingTemplateId || deletingTemplateId ? " disabled" : "";
                templateList.innerHTML = html + addInput + '<button id="addTemplateBtn" class="template-btn add-btn" type="button" data-action="add-template" title="新增模板" aria-label="新增模板"' + addDisabled + '>+</button>';
                focusTemplateInput();
            }

            function focusTemplateInput() {
                if (!isAddingTemplate && !editingTemplateId) {
                    return;
                }
                setTimeout(function () {
                    const input = document.querySelector(".template-name-input");
                    if (input instanceof HTMLInputElement) {
                        input.focus();
                        input.select();
                    }
                }, 0);
            }

            function resetTemplateInlineState() {
                isAddingTemplate = false;
                newTemplateName = "";
                editingTemplateId = "";
                editingTemplateName = "";
                deletingTemplateId = "";
            }

            function startAddTemplate() {
                resetTemplateInlineState();
                isAddingTemplate = true;
                renderTemplates();
            }

            function cancelAddTemplate() {
                isAddingTemplate = false;
                newTemplateName = "";
                renderTemplates();
            }

            function confirmAddTemplate() {
                if (!isAddingTemplate) {
                    return;
                }
                const name = newTemplateName.trim();
                if (!name) {
                    cancelAddTemplate();
                    return;
                }
                const newId = "tpl-" + Date.now();
                templates.push({ id: newId, name: name });
                activeTemplateId = newId;
                isAddingTemplate = false;
                newTemplateName = "";
                deletingTemplateId = "";
                renderTemplates();
                renderGroups();
                markDirty();
                setMessage("已新增模板。", 2200);
            }

            function startRenameTemplate(tplId) {
                const tpl = templates.find(function (t) { return t.id === tplId; });
                if (!tpl) {
                    return;
                }
                resetTemplateInlineState();
                editingTemplateId = tplId;
                editingTemplateName = tpl.name;
                renderTemplates();
            }

            function cancelRenameTemplate() {
                editingTemplateId = "";
                editingTemplateName = "";
                renderTemplates();
            }

            function confirmRenameTemplate() {
                const tplId = editingTemplateId;
                const tpl = templates.find(function (t) { return t.id === tplId; });
                const name = editingTemplateName.trim();
                if (!tplId || !tpl || !name || name === tpl.name) {
                    cancelRenameTemplate();
                    return;
                }
                tpl.name = name;
                editingTemplateId = "";
                editingTemplateName = "";
                renderTemplates();
                markDirty();
                setMessage("模板名称已更新。", 2200);
            }

            function startDeleteTemplate(tplId) {
                if (templates.length <= 1) {
                    setMessage("请至少保留一个模板。", 2200);
                    return;
                }
                resetTemplateInlineState();
                deletingTemplateId = tplId;
                renderTemplates();
            }

            function cancelDeleteTemplate() {
                deletingTemplateId = "";
                renderTemplates();
            }

            function confirmDeleteTemplate(tplId) {
                const tplIndex = templates.findIndex(function (t) { return t.id === tplId; });
                if (tplIndex === -1) {
                    cancelDeleteTemplate();
                    return;
                }
                templates.splice(tplIndex, 1);
                if (activeTemplateId === tplId && templates.length) {
                    activeTemplateId = templates[0].id;
                    renderGroups();
                }
                deletingTemplateId = "";
                renderTemplates();
                markDirty();
                setMessage("模板已删除。", 2200);
            }

            const relatedPartyOptions = [
                { value: "person", label: "缴存人" },
                { value: "unit", label: "缴存单位" },

                ).join("");

                    options = options.concat(units);
                });


                const currentValue = taskUnit.value;
                taskUnit.innerHTML = renderSelectOptions(options, "任务单元");
                taskUnit.disabled = !options.length;

                const nextValue = options.some(function (item) {
                    return item.value === currentValue;
                }) ? currentValue : "";
                taskUnit.value = nextValue;
            }

                                    const groupId = "tq-generated-" + node.key + "-" + title;
                                    for (var i = 0; i < groups.length; i++) {
                                        if (groups[i].id === groupId) {
                                            group = groups[i];
                                            break;
                                        }
                                    }
                                }
                                if (!group) {
                                    const resolvedTitle = (task === "tq" && typeof getTqElementGroupTitle === "function")
                                        ? getTqElementGroupTitle(node.title, title)
                                        : title;
                                    group = groupTitleMap[resolvedTitle];
                                }
                                return group ? {
                                    key: group.id,
                                    title: group.displayTitle || group.title,
                                    groupId: group.id
                                } : null;
                            }).filter(Boolean)
                        };
                    }).filter(function (node) {
                        return node.items.length > 0;
                    }));
                }

                return withNodeEnabled([{
                    key: task + "-all",
                    title: "全部配置",
                    items: groups.map(function (group) {
                        return {
                            key: group.id,
                            title: group.title,
                            groupId: group.id
                        };
                    })
                }]);
            }

            function ensureNodeEnabledState(task, catalogNodes) {
                if (!nodeEnabledState[task]) {
                    nodeEnabledState[task] = {};
                }

                catalogNodes.forEach(function (node) {
                    if (typeof nodeEnabledState[task][node.key] !== "boolean") {
                        nodeEnabledState[task][node.key] = true;
                    }
                });
            }

            function isNodeEnabled(task, nodeKey) {
                return nodeEnabledState[task] ? nodeEnabledState[task][nodeKey] !== false : true;
            }

            function setNodeEnabled(task, nodeKey, enabled) {
                if (!nodeEnabledState[task]) {
                    nodeEnabledState[task] = {};
                }
                nodeEnabledState[task][nodeKey] = enabled;
            }

            function ensureCatalogState(task, catalogNodes) {
                if (!catalogState[task]) {
                    catalogState[task] = {
                        nodeKey: "",
                        itemKey: ""
                    };
                }

                const currentState = catalogState[task];
                const availableNode = catalogNodes.some(function (node) {
                    return node.key === currentState.nodeKey;
                }) ? catalogNodes.find(function (node) {
                    return node.key === currentState.nodeKey;
                }) : (catalogNodes[0] || null);

                currentState.nodeKey = availableNode ? availableNode.key : "";

                const itemList = availableNode ? availableNode.items : [];
                const availableItem = itemList.some(function (item) {
                    return item.key === currentState.itemKey;
                }) ? itemList.find(function (item) {
                    return item.key === currentState.itemKey;
                }) : (itemList[0] || null);

                currentState.itemKey = availableItem ? availableItem.key : "";
            }

            function ensureCatalogNodeExpandState(task, catalogNodes) {
                ensureCatalogState(task, catalogNodes);
                if (!catalogNodeExpandState[task]) {
                    catalogNodeExpandState[task] = {};
                }

                const currentNodeKey = catalogState[task].nodeKey;
                const nodeState = catalogNodeExpandState[task];

                catalogNodes.forEach(function (node) {
                    if (typeof nodeState[node.key] !== "boolean") {
                        nodeState[node.key] = node.key === currentNodeKey;
                    }
                });

                Object.keys(nodeState).forEach(function (nodeKey) {
                    const exists = catalogNodes.some(function (node) {
                        return node.key === nodeKey;
                    });
                    if (!exists) {
                        delete nodeState[nodeKey];
                    }
                });
            }

            function isCatalogNodeExpanded(task, catalogNodes, nodeKey) {
                ensureCatalogNodeExpandState(task, catalogNodes);
                return catalogNodeExpandState[task][nodeKey] === true;
            }

            function setCatalogNodeExpanded(task, catalogNodes, nodeKey, expanded) {
                ensureCatalogNodeExpandState(task, catalogNodes);
                catalogNodeExpandState[task][nodeKey] = expanded;
            }

            function areAllCatalogNodesExpanded(task, catalogNodes) {
                ensureCatalogNodeExpandState(task, catalogNodes);
                return catalogNodes.length > 0 && catalogNodes.every(function (node) {
                    return catalogNodeExpandState[task][node.key] === true;
                });
            }

            function setAllCatalogNodesExpanded(task, catalogNodes, expanded) {
                ensureCatalogNodeExpandState(task, catalogNodes);
                catalogNodes.forEach(function (node) {
                    catalogNodeExpandState[task][node.key] = expanded;
                });
            }

            function isAllCatalogDetailsExpanded(task) {
                return catalogDetailExpandAllState[task] === true;
            }

            function setAllCatalogDetailsExpanded(task, expanded) {
                catalogDetailExpandAllState[task] = expanded;
            }

            function ensureCatalogItemExpandState(task, catalogNodes) {
                ensureCatalogState(task, catalogNodes);
                const currentState = catalogState[task];
                const isFirstInit = !catalogItemExpandState[task];
                if (!catalogItemExpandState[task]) {
                    catalogItemExpandState[task] = {};
                }

                catalogNodes.forEach(function (node) {
                    if (!catalogItemExpandState[task][node.key]) {
                        catalogItemExpandState[task][node.key] = {};
                    }
                    node.items.forEach(function (item) {
                        if (typeof catalogItemExpandState[task][node.key][item.key] !== "boolean") {
                            catalogItemExpandState[task][node.key][item.key] = false;
                        }
                    });

                    Object.keys(catalogItemExpandState[task][node.key]).forEach(function (itemKey) {
                        const exists = node.items.some(function (item) {
                            return item.key === itemKey;
                        });
                        if (!exists) {
                            delete catalogItemExpandState[task][node.key][itemKey];
                        }
                    });
                });

                Object.keys(catalogItemExpandState[task]).forEach(function (nodeKey) {
                    const exists = catalogNodes.some(function (node) {
                        return node.key === nodeKey;
                    });
                    if (!exists) {
                        delete catalogItemExpandState[task][nodeKey];
                    }
                });

                if (isFirstInit && currentState.nodeKey && currentState.itemKey) {
                    const currentNodeState = catalogItemExpandState[task][currentState.nodeKey];
                    if (currentNodeState) {
                        currentNodeState[currentState.itemKey] = true;
                    }
                }
            }


            function isCatalogItemExpanded(task, catalogNodes, nodeKey, itemKey) {
                ensureCatalogItemExpandState(task, catalogNodes);
                return Boolean(
                    catalogItemExpandState[task]
                    && catalogItemExpandState[task][nodeKey]
                    && catalogItemExpandState[task][nodeKey][itemKey]
                );
            }

            function setCatalogItemExpanded(task, catalogNodes, nodeKey, itemKey, expanded) {
                ensureCatalogItemExpandState(task, catalogNodes);
                if (!catalogItemExpandState[task][nodeKey]) {
                    catalogItemExpandState[task][nodeKey] = {};
                }
                catalogItemExpandState[task][nodeKey][itemKey] = expanded;
            }

            function getCurrentCatalogSelection(catalogNodes) {
                const task = getCurrentTask();
                ensureCatalogState(task, catalogNodes);
                const currentState = catalogState[task];
                const node = catalogNodes.find(function (item) {
                    return item.key === currentState.nodeKey;
                }) || null;
                const catalogItem = node ? node.items.find(function (item) {
                    return item.key === currentState.itemKey;
                }) : null;
                const group = catalogItem
                    ? getCurrentGroups().find(function (item) {
                        return item.id === catalogItem.groupId;
                    }) || null
                    : null;

                return {
                    node: node,
                    item: catalogItem,
                    group: group
                };
            }

            function getDefaultAlgorithmParamGroup() {
                return {
                    selectedValues: [],
                    result: ""
                };
            }

            function getGroupDisplayTitle(group) {
                return group && (group.displayTitle || group.title) ? (group.displayTitle || group.title) : "";
            }

            function getAppliedBusinessNames(appliedBusinesses) {
                const labels = getBusinessLabelMap();
                return (appliedBusinesses || []).map(function (value) {
                    return labels[value];
                }).filter(Boolean);
            }

            function getContextualParamTemplate(row, group) {

                const objectName = row && row.objectName ? row.objectName : "";
                const groupTitle = group && group.title ? group.title : "";
                const groupDisplayTitle = getGroupDisplayTitle(group);
                const businessNames = getAppliedBusinessNames(row && row.appliedBusinesses);
                const businessScopeText = businessNames.length ? businessNames.join("、") : "当前所选业务";

                if (groupTitle.indexOf("内容-") === 0 || groupDisplayTitle === "内容") {
                    const displayOptions = objectName.indexOf("材料") > -1

                        : objectName.indexOf("金额") > -1
                            ? ["系统自动测算", "申请录入联动", "人工修正留痕", "提交前确认"]
                            : ["中心档案回显", "共享接口回填", "申请录入补充", "提交前确认"];
                    const selectedValues = displayOptions.slice(0, 2);
                    const resultText = objectName.indexOf("材料") > -1
                        ? "按“" + rowName + "”字段优先读取材料识别结果，不足项允许人工补录后再确认。"
                        : objectName.indexOf("金额") > -1

                    return {

                    };
                }

                if (groupTitle.indexOf("办理标准-") === 0 || groupDisplayTitle === "办理标准") {
                    return {

                            multiple: true,
                            showSelector: true
                        },
                        groups: [{

                        }]

                        },
                        groups: [{

                        }]
                    };
                }

                if (groupTitle === "业务互斥") {
                    return {
                        paramConfig: {
                            label: "互斥判定范围",
                            options: ["历史办理记录", "在途申请记录", "家庭共享记录", "跨渠道重复校验"],
                            multiple: true,
                            showSelector: true
                        },
                        groups: [{
                            selectedValues: ["历史办理记录", "在途申请记录"],
                            result: "“" + rowName + "”优先校验历史办理和在途申请，避免同类业务重复受理。"
                        }]
                    };
                }

                if (groupTitle === "流程节点推送规则") {
                    return {
                        paramConfig: {
                            label: "节点流转方式",
                            options: ["自动推送下一岗", "命中异常转人工", "超时自动催办", "退回补正重提"],
                            multiple: true,
                            showSelector: true
                        },
                        groups: [{
                            selectedValues: ["自动推送下一岗", "命中异常转人工"],
                            result: "“" + rowName + "”默认自动流转，命中异常时切换至人工处理路径。"
                        }]
                    };
                }

                if (groupTitle === "材料完整性校验") {
                    return {
                        paramConfig: {
                            label: "材料校验方式",
                            options: ["要件清单比对", "OCR识别校验", "影像质量检查", "人工补核确认"],
                            multiple: true,
                            showSelector: true
                        },
                        groups: [{
                            selectedValues: ["要件清单比对", "OCR识别校验"],
                            result: "“" + rowName + "”默认按要件清单和 OCR 结果双重校验，异常时转人工补核。"
                        }]
                    };
                }
                if (groupTitle === "业务风险") {
                    return {
                        paramConfig: {
                            label: "风险处置策略",
                            options: ["自动风险预警", "人工复核介入", "限制继续办理", "结果留痕报送"],
                            multiple: true,
                            showSelector: true
                        },
                        groups: [{
                            selectedValues: ["自动风险预警", "人工复核介入"],
                            result: "“" + rowName + "”命中后先触发预警，再根据等级决定是否转人工复核。"
                        }]
                    };
                }

                return {
                    paramConfig: {
                        label: "规则处理方式",
                        options: ["系统自动处理", "人工确认处理", "异常留痕", "结果回写"],
                        multiple: true,
                        showSelector: true
                    },
                    groups: [{
                        selectedValues: ["系统自动处理"],
                        result: "“" + rowName + "”按当前节点默认规则执行。"
                    }]
                };
            }

            function getNormalizedAlgorithmParamGroups(row, group) {
                if (row.algorithmParams && Array.isArray(row.algorithmParams.groups) && row.algorithmParams.groups.length) {
                    return row.algorithmParams.groups.map(function (group) {
                        return {
                            selectedValues: Array.isArray(group.selectedValues)
                                ? group.selectedValues.slice()
                                : (Array.isArray(group.talentTypes) ? group.talentTypes.slice() : []),
                            result: typeof group.result === "string" ? group.result : ""
                        };
                    });
                }

                if (row.algorithmParams && Array.isArray(row.algorithmParams.talentTypes)) {
                    return [{
                        selectedValues: row.algorithmParams.talentTypes.slice(),
                        result: typeof row.algorithmParams.result === "string" ? row.algorithmParams.result : ""
                    }];
                }

                return getContextualParamTemplate(row, group).groups || [getDefaultAlgorithmParamGroup()];
            }

            function getAlgorithmSelectedValues(row) {
                const values = [];
                const algorithmParams = row && row.algorithmParams;
                if (!algorithmParams) {
                    return values;
                }

                function appendValues(items) {
                    if (!Array.isArray(items)) {
                        return;
                    }
                    items.forEach(function (item) {
                        if (item && values.indexOf(item) === -1) {
                            values.push(item);
                        }
                    });
                }

                if (Array.isArray(algorithmParams.groups)) {
                    algorithmParams.groups.forEach(function (group) {
                        appendValues(group && group.selectedValues);
                        appendValues(group && group.talentTypes);
                    });
                }
                appendValues(algorithmParams.talentTypes);
                return values;
            }

            function getParameterConfig(row, group) {
                const template = getContextualParamTemplate(row, group);
                const templateConfig = template && template.paramConfig ? template.paramConfig : {};
                const rowConfig = row && row.paramConfig ? row.paramConfig : {};
                const parameterConfig = Object.assign({}, templateConfig, rowConfig);
                const options = Array.isArray(rowConfig.options)
                    ? rowConfig.options.slice()
                    : (Array.isArray(templateConfig.options) ? templateConfig.options.slice() : []);

                getAlgorithmSelectedValues(row).forEach(function (value) {
                    if (options.indexOf(value) === -1) {
                        options.push(value);
                    }
                });

                parameterConfig.options = options;
                parameterConfig.label = parameterConfig.label || templateConfig.label || "配置参数";
                if (parameterConfig.showSelector !== false) {
                    parameterConfig.showSelector = true;
                }
                if (typeof parameterConfig.multiple !== "boolean") {
                    parameterConfig.multiple = true;
                }
                return parameterConfig;
            }

            function getSelectedTalentTypesFromGroup(groupElement) {
                return Array.from(
                    groupElement.querySelectorAll("input[data-talent-type]:checked")
                ).map(function (input) {
                    return input.getAttribute("data-talent-type");
                });
            }

            function formatTalentTypeResult(values) {
                return values.length ? values.join("、") : "";
            }

            function updateGroupTrigger(groupElement) {
                const trigger = groupElement.querySelector(".multi-select-trigger");
                const selected = getSelectedTalentTypesFromGroup(groupElement);
                const text = selected.length ? selected.join("、") : "请选择";
                if (trigger) {
                    trigger.textContent = text;
                }
            }

            function renderAlgorithmParamGroups(groups) {
                const parameterConfig = getParameterConfig(
                    currentConfigContext && currentConfigContext.row,
                    currentConfigContext && currentConfigContext.group
                );
                algorithmParamGroupList.innerHTML = groups.map(function (group, index) {
                    const selectedSet = new Set(group.selectedValues || []);
                    const selectedText = group.selectedValues && group.selectedValues.length
                        ? group.selectedValues.join("、")
                        : "请选择";
                    const selectorHtml = parameterConfig.showSelector === false ? "" : [
                        '<div class="param-form-item">',
                        "<label>" + escapeHtml(parameterConfig.label) + "</label>",
                        '<div class="multi-select">',
                        '<button class="multi-select-trigger" type="button" data-action="toggle-talent-panel"> ' + escapeHtml(selectedText) + "</button>",
                        '<div class="multi-select-panel">',
                        parameterConfig.options.map(function (option) {
                            return [
                                '<label class="multi-select-option">',
                                '<input type="checkbox" data-talent-type="' + escapeHtml(option) + '"' + (selectedSet.has(option) ? " checked" : "") + '>',
                                "<span>" + escapeHtml(option) + "</span>",
                                "</label>"
                            ].join("");
                        }).join(""),
                        "</div>",
                        "</div>",
                        "</div>"
                    ].join("");

                    return [
                        '<div class="param-group-card" data-param-group="' + index + '">',
                        '<div class="param-group-header">',
