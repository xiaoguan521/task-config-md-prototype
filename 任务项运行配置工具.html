                            ? '<button class="btn-link" type="button" data-action="remove-param-group" data-group-index="' + index + '">删除</button>'
                            : '<span></span>',
                        "</div>",
                        selectorHtml,
                        '<div class="param-group-result">',
                        "<label>业务标准值</label>",
                        '<input class="param-result-input" type="text" value="' + escapeHtml(group.result || "") + '" placeholder="请输入结果">',
                        "</div>",
                        "</div>"
                    ].join("");
                }).join("");
            }

            function collectAlgorithmParamGroups() {
                return Array.from(
                    algorithmParamGroupList.querySelectorAll("[data-param-group]")
                ).map(function (groupElement) {
                    const resultInput = groupElement.querySelector(".param-result-input");
                    return {
                        selectedValues: getSelectedTalentTypesFromGroup(groupElement),
                        result: resultInput instanceof HTMLInputElement ? resultInput.value.trim() : ""
                    };
                });
            }

            function closeTalentTypeDropdown(scope) {
                const container = scope || algorithmParamGroupList;
                Array.from(container.querySelectorAll(".multi-select.open")).forEach(function (element) {
                    element.classList.remove("open");
                });
            }

            function isRowUsed(row) {
                return Array.isArray(row.appliedBusinesses) && row.appliedBusinesses.length > 0;
            }

            function getUsageFilter() {
                const task = getCurrentTask();
                ensureUsageFilterState(task);
                return usageFilterState[task];
            }

            function getVisibleRows(group) {
                return group.rows || [];
            }

            function getVisibleCatalogNodes(catalogNodes) {
                const filter = getUsageFilter();
                return (catalogNodes || []).filter(function (node) {
                    return !filter.enabled
                        || (filter.enabled === "enabled" && node.enabled !== false)
                        || (filter.enabled === "disabled" && node.enabled === false);
                });
            }

            function getUsageTagClass(name) {
                if (/提取|购房|租房/.test(name)) {
                    return "tag tag-withdraw";
                }
                if (/贷款|首套|组合|还款/.test(name)) {
                    return "tag tag-loan";
                }
                return "tag tag-manage";
            }

            function renderUsageContent(appliedBusinesses) {
                const labels = getBusinessLabelMap();
                const names = (appliedBusinesses || []).map(function (value) {
                    return labels[value];
                }).filter(Boolean);

                if (!names.length) {
                    return '<span class="usage-empty">未使用</span>';
                }

                return '<div class="usage-list">' + names.map(function (name) {
                    return '<span class="' + getUsageTagClass(name) + '">' + escapeHtml(name) + "</span>";
                }).join("") + "</div>";
            }

            function renderDescriptionContent(row) {
                const text = row.description || "";
                if (text.indexOf("\n") >= 0) {
                    return '<div class="description-text">' + escapeHtml(text).replace(/\n/g, "<br>") + "</div>";
                }
                return escapeHtml(text);
            }

            function escapeMarkdownTableCell(value) {
                return String(value === undefined || value === null ? "" : value)
                    .replace(/\r?\n/g, "<br>")
                    .replace(/\|/g, "\\|")
                    .trim();
            }

            function renderMarkdownTableRow(cells) {
                return "| " + cells.map(escapeMarkdownTableCell).join(" | ") + " |\n";
            }

            function getMarkdownParamRows(row, group) {
                const parameterConfig = getParameterConfig(row, group) || {};
                const paramLabel = parameterConfig.label || "配置参数";
                return getNormalizedAlgorithmParamGroups(row, group).map(function (paramGroup) {
                    const selectedValues = Array.isArray(paramGroup.selectedValues)
                        ? paramGroup.selectedValues.filter(Boolean)
                        : [];
                    return {
                        label: paramLabel,
                        selectedText: selectedValues.length ? selectedValues.join("、") : "",
                        result: typeof paramGroup.result === "string" ? paramGroup.result.trim() : ""
                    };
                }).filter(function (paramGroup) {
                    return paramGroup.selectedText || paramGroup.result;
                });
            }

            function renderGroupTable(group) {
                const displayTitle = getGroupDisplayTitle(group);
                const isContentGroup = displayTitle === "内容" || displayTitle === "展示内容配置";
                const hasObjectColumn = Object.prototype.hasOwnProperty.call(group.columns, "objectName");
                const emptyColspan = (hasObjectColumn ? 6 : 5) - (isContentGroup ? 1 : 0);
                const visibleRows = getVisibleRows(group);
                const currentSelection = getCurrentCatalogSelection(getCatalogNodes());
                const isCurrentNodeDisabled = currentSelection.node && currentSelection.node.enabled === false;
                const colGroupHtml = hasObjectColumn
                    ? [

                        '<col>',
                        '<col style="width: 320px;">',

                    : [

                        '<col style="width: 72px;">',
                        '<col style="width: 300px;">',
                        '<col style="width: 500px;">',
                        '<col style="width: 200px;">',
                        isContentGroup ? "" : '<col style="width: 80px;">',
                        "</colgroup>"
                    ].join("");
                const rowsHtml = visibleRows.length ? visibleRows.map(function (row, index) {
                    const isRowDisabled = row.enabled === false;
                    const actionTitle = isCurrentNodeDisabled ? "当前节点已停用，暂不可配置" : (isRowDisabled ? "请先启用该配置项" : "业务配置");
                    const isActionDisabled = isCurrentNodeDisabled || isRowDisabled;
                    return [
                        "<tr>",
                        '<td class="index-cell">' + (index + 1) + "</td>",
                        hasObjectColumn ? '<td class="object-cell">' + escapeHtml(row.objectName || "") + "</td>" : "",
                        "<td>" + escapeHtml(row.formula) + "</td>",
                        "<td>" + renderDescriptionContent(row) + "</td>",
                        '<td class="usage-cell"><button type="button" role="switch" aria-checked="' + (row.enabled !== false) + '" class="ant-switch" data-action="toggle-row-enabled" data-group-id="' + escapeHtml(group.id) + '" data-row-id="' + escapeHtml(row.id) + '"><span class="ant-switch-handle"></span></button></td>',
                        isContentGroup ? "" : '<td class="actions-cell"><button class="icon-button" type="button" title="' + actionTitle + '" aria-label="' + actionTitle + '" data-action="config-business" data-group-id="' + escapeHtml(group.id) + '" data-row-id="' + escapeHtml(row.id) + '"' + (isActionDisabled ? " disabled" : "") + '><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.22-1.13.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.69 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94L2.81 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.41 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.58-.22 1.13-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/></svg></button></td>',
                        "</tr>"
                    ].join("");
                }).join("") : '<tr><td colspan="' + emptyColspan + '"><div class="table-empty-state">当前筛选条件下暂无清册</div></td></tr>';

                return [
                    '<div class="table-wrap">',
                    "<table>",
                    colGroupHtml,
                    "<thead>",
                    "<tr>",
                    '<th class="index-cell">序号</th>',
                    hasObjectColumn ? '<th class="object-cell">' + escapeHtml(group.columns.objectName) + "</th>" : "",
                    "<th>" + escapeHtml(group.columns.formula) + "</th>",
                    "<th>" + escapeHtml(group.columns.description) + "</th>",
                    '<th class="usage-cell">是否应用</th>',
                    isContentGroup ? "" : '<th class="actions-cell">操作</th>',
                    "</tr>",
                    "</thead>",
                    "<tbody>",
                    rowsHtml,
                    "</tbody>",
                    "</table>",
                    "</div>"
                ].join("");
            }

            function renderCatalogLayout(catalogNodes, selection) {
                const task = getCurrentTask();
                const currentNode = selection.node;
                const expandAllDetails = isAllCatalogDetailsExpanded(task);
                ensureCatalogNodeExpandState(task, catalogNodes);
                const navHtml = catalogNodes.map(function (node) {
                    const isCurrentNode = currentNode && currentNode.key === node.key;
                    const isExpanded = isCatalogNodeExpanded(task, catalogNodes, node.key);
                    const childHtml = isExpanded ? node.items.map(function (item) {
                        const isCurrentItemExpanded = isCatalogItemExpanded(task, catalogNodes, node.key, item.key);
                        const itemGroup = getCurrentGroups().find(function (group) {
                            return group.id === item.groupId;
                        }) || null;
                        const shouldShowDetail = expandAllDetails || isCurrentItemExpanded;
                        const detailHtml = shouldShowDetail
                            ? [
                                '<div class="catalog-tree-detail">',
                                node.enabled === false ? '<div class="catalog-disabled-tip">当前节点已停用，当前内容仅支持查看；如需恢复配置，可在左侧流程节点上重新启用。</div>' : "",
                                itemGroup ? renderGroupTable(itemGroup) : '<div class="empty-state">当前目录下暂无可展示的配置内容</div>',
                                "</div>"
                            ].join("")
                            : "";
                        return [
                            '<div class="catalog-tree-branch">',
                            '<button class="catalog-tree-item' + (shouldShowDetail ? " active" : "") + '" type="button" data-action="select-catalog-item" data-node-key="' + escapeHtml(node.key) + '" data-item-key="' + escapeHtml(item.key) + '">',
                            escapeHtml(item.title),
                            "</button>",
                            detailHtml,
                            "</div>"
                        ].join("");
                    }).join("") : "";
                    return [
                        '<div class="catalog-tree-node' + (isCurrentNode ? " active" : "") + (node.enabled === false ? " disabled" : "") + '">',
                        '<div class="catalog-tree-node-row">',
                        '<div class="catalog-tree-node-main">',
                        '<input type="checkbox" class="node-toggle-checkbox" data-action="toggle-node-enabled" data-node-key="' + escapeHtml(node.key) + '" ' + (node.enabled === false ? "" : "checked") + ' title="启用/停用节点">',
                        '<button class="catalog-tree-node-btn" type="button" data-action="select-catalog-node" data-node-key="' + escapeHtml(node.key) + '">',
                        '<span class="catalog-tree-node-text">' + escapeHtml(node.title) + "</span>",
                        "</button>",
                        "</div>",
                        "</div>",
                        childHtml ? '<div class="catalog-tree-children">' + childHtml + "</div>" : "",
                        "</div>"
                    ].join("");
                }).join("");

                return [
                    '<div class="catalog-layout">',
                    '<section class="catalog-column">',
                    '<div class="catalog-nav">',
                    '<div class="catalog-tree-head"><span class="catalog-tree-head-title">节点-要素-内容</span></div>',
                    '<div class="catalog-tree">' + navHtml + "</div>",
                    "</div>",
                    "</section>",
                    "</div>"
                ].join("");
            }

            function renderGroups() {
                const task = getCurrentTask();
                const groups = getCurrentGroups();
                ensureUsageFilterState(task);
                syncBusinessCategoryOptions();
                globalEnabledFilter.value = getUsageFilter().enabled;
                const catalogNodes = getVisibleCatalogNodes(getCatalogNodes());
                const selection = getCurrentCatalogSelection(catalogNodes);
                const allExpanded = areAllCatalogNodesExpanded(task, catalogNodes);

                totalText.textContent = getCurrentTaskPathText();
                toggleAllCatalogNodesBtn.textContent = allExpanded ? "收起" : "展开";
                toggleAllCatalogNodesBtn.disabled = !catalogNodes.length;

                if (!groups.length) {
                    groupContainer.innerHTML = '<div class="empty-state">当前任务项暂无可展示的清册内容</div>';
                    return;
                }

                if (!catalogNodes.length) {
                    groupContainer.innerHTML = '<div class="empty-state">当前筛选条件下暂无流程节点</div>';
                    return;
                }

                groupContainer.innerHTML = renderCatalogLayout(catalogNodes, selection);
            }

            function setMessage(text, timeout) {
                messageBox.textContent = text;
                if (setMessage.timer) {
                    clearTimeout(setMessage.timer);
                }
                if (timeout) {
                    setMessage.timer = setTimeout(function () {
                        messageBox.textContent = "";
                    }, timeout);
                }
            }

            function findRowContext(groupId, rowId) {
                const groups = getCurrentGroups();
                for (let i = 0; i < groups.length; i += 1) {
                    if (groups[i].id !== groupId) {
                        continue;
                    }
                    for (let j = 0; j < groups[i].rows.length; j += 1) {
                        if (groups[i].rows[j].id === rowId) {
                            return {
                                group: groups[i],
                                row: groups[i].rows[j]
                            };
                        }
                    }
                }
                return null;
            }

            function openBusinessConfig(groupId, rowId) {
                const context = findRowContext(groupId, rowId);
                if (!context) {
                    return;
                }

                const currentSelection = getCurrentCatalogSelection(getCatalogNodes());
                if (currentSelection.node && currentSelection.node.enabled === false) {
                    setMessage("当前节点已停用，暂不支持修改业务配置。", 2200);
                    return;
                }

                currentConfigContext = context;
                const options = getBusinessOptions();
                const appliedSet = new Set(context.row.appliedBusinesses || []);
                const algorithmParamGroups = getNormalizedAlgorithmParamGroups(context.row, context.group);
                const shouldShowAlgorithmParams = getGroupDisplayTitle(context.group) !== "内容";

                configTargetText.innerHTML = [
                    "<strong>当前清册：</strong>",
                    escapeHtml(getGroupDisplayTitle(context.group)),
                    " \\ ",
                    escapeHtml(context.row.formula)
                ].join("");

                businessOptionList.innerHTML = "";

                algorithmParamSection.classList.toggle("section-hidden", !shouldShowAlgorithmParams);
                if (shouldShowAlgorithmParams) {
                    renderAlgorithmParamGroups(algorithmParamGroups);
                } else {
                    algorithmParamGroupList.innerHTML = "";
                    closeTalentTypeDropdown();
                }
                closeTalentTypeDropdown();
                businessConfigModalMask.classList.add("open");
                businessConfigModalMask.setAttribute("aria-hidden", "false");
            }

            function closeBusinessConfig() {
                currentConfigContext = null;
                algorithmParamSection.classList.remove("section-hidden");
                closeTalentTypeDropdown();
                businessConfigModalMask.classList.remove("open");
                businessConfigModalMask.setAttribute("aria-hidden", "true");
            }

            function confirmBusinessConfig() {
                if (!currentConfigContext) {
                    closeBusinessConfig();
                    return;
                }

                const algorithmParamGroups = collectAlgorithmParamGroups();

                currentConfigContext.row.algorithmParams = {
                    groups: algorithmParamGroups
                };
                closeBusinessConfig();
                renderGroups();
                markDirty();

                setMessage("高级配置已更新。", 2600);
            }

            function handleSearch() {
                renderGroups();
                setMessage("已按当前筛选条件刷新目录和清册。", 2200);
            }

            searchBtn.addEventListener("click", handleSearch);

            addParamGroupBtn.addEventListener("click", function () {
                const groups = collectAlgorithmParamGroups();
                groups.push(getDefaultAlgorithmParamGroup());
                renderAlgorithmParamGroups(groups);
            });

            toggleAllCatalogNodesBtn.addEventListener("click", function () {
                const task = getCurrentTask();
                const catalogNodes = getCatalogNodes();
                const nextExpanded = !areAllCatalogNodesExpanded(task, catalogNodes);
                setAllCatalogNodesExpanded(task, catalogNodes, nextExpanded);
                setAllCatalogDetailsExpanded(task, nextExpanded);
                renderGroups();
            });

            algorithmParamGroupList.addEventListener("click", function (event) {
                const target = event.target;
                if (!(target instanceof Element)) {
                    return;
                }

                const actionTarget = target.closest("[data-action]");
                if (!(actionTarget instanceof HTMLElement)) {
                    return;
                }

                const action = actionTarget.getAttribute("data-action");

                if (action === "toggle-talent-panel") {
                    const select = actionTarget.closest(".multi-select");
                    if (!(select instanceof HTMLElement)) {
                        return;
                    }
                    const willOpen = !select.classList.contains("open");
                    closeTalentTypeDropdown();
                    if (willOpen) {
                        select.classList.add("open");
                    }
                    return;
                }

                if (action === "remove-param-group") {
                    const groupIndex = Number(actionTarget.getAttribute("data-group-index"));
                    const groups = collectAlgorithmParamGroups().filter(function (_, index) {
                        return index !== groupIndex;
                    });
                    renderAlgorithmParamGroups(groups.length ? groups : [getDefaultAlgorithmParamGroup()]);
                }
            });

            algorithmParamGroupList.addEventListener("change", function (event) {
                const target = event.target;
                if (!(target instanceof Element) || !target.matches("input[data-talent-type]")) {
                    return;
                }
                const parameterConfig = getParameterConfig(
                    currentConfigContext && currentConfigContext.row,
                    currentConfigContext && currentConfigContext.group
                );
                if (!parameterConfig.multiple && target instanceof HTMLInputElement && target.checked) {
                    const groupElement = target.closest("[data-param-group]");
                    if (groupElement instanceof HTMLElement) {
                        Array.from(groupElement.querySelectorAll("input[data-talent-type]")).forEach(function (input) {
                            if (input !== target && input instanceof HTMLInputElement) {
                                input.checked = false;
                            }
                        });
                    }
                }
                const groupElement = target.closest("[data-param-group]");
                if (!(groupElement instanceof HTMLElement)) {
                    return;
                }
                updateGroupTrigger(groupElement);
            });

            relatedParty.addEventListener("change", function () {
                syncTaskUnitOptions();
                renderGroups();
                setMessage("");
            });

            taskUnit.addEventListener("change", function () {
                renderGroups();
                setMessage("");
            });

            const templateListElement = document.getElementById("templateList");
            if (templateListElement) {
                templateListElement.addEventListener("click", function (event) {
                    const target = event.target;
                    if (!(target instanceof Element)) {
                        return;
                    }
                    const actionTarget = target.closest("[data-action]");
                    if (!actionTarget) return;

                    const action = actionTarget.getAttribute("data-action");
                    const tplId = actionTarget.getAttribute("data-tpl-id");

                    if (action === "select-template") {
                        if (activeTemplateId !== tplId) {
                            activeTemplateId = tplId;
                            renderTemplates();
                            const task = getCurrentTask();
                            const catalogNodes = getCatalogNodes();
                            ensureNodeEnabledState(task, catalogNodes);
                            catalogNodes.forEach(function (node) {
                                const hash = (tplId + node.key).split('').reduce((a, b) => a + b.charCodeAt(0), 0);
                                setNodeEnabled(task, node.key, hash % 3 !== 0);
                            });
                            renderGroups();
                            const tpl = templates.find(t => t.id === tplId);
                            if (tpl) setMessage("已加载模板配置：" + tpl.name, 2000);
                        }
                    } else if (action === "add-template") {
                        startAddTemplate();
                    } else if (action === "edit-template") {
                        startRenameTemplate(tplId);
                    } else if (action === "delete-template") {
                        startDeleteTemplate(tplId);
                    } else if (action === "confirm-delete-template") {
                        confirmDeleteTemplate(tplId);
                    } else if (action === "cancel-delete-template") {
                        cancelDeleteTemplate();
                    }
                });

                templateListElement.addEventListener("input", function (event) {
                    const target = event.target;
                    if (!(target instanceof HTMLInputElement) || !target.classList.contains("template-name-input")) {
                        return;
                    }
                    const mode = target.getAttribute("data-template-mode");
                    if (mode === "add") {
                        newTemplateName = target.value;
                    } else if (mode === "rename") {
                        editingTemplateName = target.value;
                    }
                });

                templateListElement.addEventListener("keydown", function (event) {
                    const target = event.target;
                    if (!(target instanceof HTMLInputElement) || !target.classList.contains("template-name-input")) {
                        return;
                    }
                    const mode = target.getAttribute("data-template-mode");
                    if (event.key === "Enter") {
                        event.preventDefault();
                        if (mode === "add") {
                            newTemplateName = target.value;
                            confirmAddTemplate();
                        } else if (mode === "rename") {
                            editingTemplateName = target.value;
                            confirmRenameTemplate();
                        }
                    } else if (event.key === "Escape") {
                        event.preventDefault();
                        if (mode === "add") {
                            cancelAddTemplate();
                        } else if (mode === "rename") {
                            cancelRenameTemplate();
                        }
                    }
                });

                templateListElement.addEventListener("focusout", function (event) {
                    const target = event.target;
                    if (!(target instanceof HTMLInputElement) || !target.classList.contains("template-name-input")) {
                        return;
                    }
                    const mode = target.getAttribute("data-template-mode");
                    if (mode === "add") {
                        newTemplateName = target.value;
                        confirmAddTemplate();
                    } else if (mode === "rename") {
                        editingTemplateName = target.value;
                        confirmRenameTemplate();
                    }
                });
            }

            groupContainer.addEventListener("click", function (event) {
                const target = event.target;
                if (!(target instanceof Element)) {
                    return;
                }

                const actionTarget = target.closest("[data-action]");
                if (!(actionTarget instanceof HTMLElement)) {
                    return;
                }

                const action = actionTarget.getAttribute("data-action");

                if (action === "toggle-row-enabled") {
                    const groupId = actionTarget.getAttribute("data-group-id");
                    const rowId = actionTarget.getAttribute("data-row-id");
                    const groups = getCurrentGroups();
                    const group = groups.find(function (g) { return g.id === groupId; });
                    if (group) {
                        const row = group.rows.find(function (r) { return r.id === rowId; });
                        if (row) {
                            const isChecked = actionTarget.getAttribute("aria-checked") === "true";
                            row.enabled = !isChecked;
                            markDirty();
                            renderGroups();
                        }
                    }
                    return;
                }

                if (action === "select-catalog-node") {
                    const task = getCurrentTask();
                    const catalogNodes = getCatalogNodes();
                    ensureCatalogState(task, catalogNodes);
                    const nodeKey = actionTarget.getAttribute("data-node-key") || "";
                    const isSameNode = catalogState[task].nodeKey === nodeKey;
                    const wasExpanded = isCatalogNodeExpanded(task, catalogNodes, nodeKey);
                    catalogState[task].nodeKey = nodeKey;
                    const selectedNode = catalogNodes.find(function (node) {
                        return node.key === catalogState[task].nodeKey;
                    });
                    if (!isSameNode) {
                        catalogState[task].itemKey = selectedNode && selectedNode.items[0]
                            ? selectedNode.items[0].key
                            : "";
                        setCatalogNodeExpanded(task, catalogNodes, catalogState[task].nodeKey, true);
                        if (catalogState[task].itemKey) {
                            setCatalogItemExpanded(task, catalogNodes, catalogState[task].nodeKey, catalogState[task].itemKey, true);
                        }
                    } else {
                        if (!catalogState[task].itemKey && selectedNode && selectedNode.items[0]) {
                            catalogState[task].itemKey = selectedNode.items[0].key;
                        }
                        setCatalogNodeExpanded(task, catalogNodes, catalogState[task].nodeKey, !wasExpanded);
                        if (!wasExpanded && catalogState[task].itemKey) {
                            setCatalogItemExpanded(task, catalogNodes, catalogState[task].nodeKey, catalogState[task].itemKey, true);
                        }
                    }
                    renderGroups();
                    return;
                }

                if (action === "select-catalog-item") {
                    const task = getCurrentTask();
                    const catalogNodes = getCatalogNodes();
                    ensureCatalogState(task, catalogNodes);
                    const nodeKey = actionTarget.getAttribute("data-node-key") || catalogState[task].nodeKey;
                    const itemKey = actionTarget.getAttribute("data-item-key") || "";
                    const isSameItem = catalogState[task].nodeKey === nodeKey && catalogState[task].itemKey === itemKey;
                    const wasExpanded = isCatalogItemExpanded(task, catalogNodes, nodeKey, itemKey);
                    setAllCatalogDetailsExpanded(task, false);
                    catalogState[task].nodeKey = nodeKey;
                    catalogState[task].itemKey = itemKey;
                    setCatalogNodeExpanded(task, catalogNodes, catalogState[task].nodeKey, true);
                    setCatalogItemExpanded(task, catalogNodes, nodeKey, itemKey, !(isSameItem && wasExpanded));
                    renderGroups();
                    return;
                }

                if (action === "toggle-node-enabled") {
                    const task = getCurrentTask();
                    const nodeKey = actionTarget.getAttribute("data-node-key") || "";
                    if (!nodeKey) {
                        return;
                    }
                    const catalogNodes = getCatalogNodes();
                    ensureNodeEnabledState(task, catalogNodes);
                    const nextEnabled = !isNodeEnabled(task, nodeKey);
                    setNodeEnabled(task, nodeKey, nextEnabled);
                    renderGroups();
                    markDirty();
                    setMessage("");
                    return;
                }

                if (action === "config-business") {
                    openBusinessConfig(
                        actionTarget.getAttribute("data-group-id"),
                        actionTarget.getAttribute("data-row-id")
                    );
                }
            });

            globalEnabledFilter.addEventListener("change", function () {
                const filter = getUsageFilter();
                filter.enabled = globalEnabledFilter.value;
                renderGroups();
            });

            businessCategory.addEventListener("change", function () {
                const filter = getUsageFilter();
                filter.businessCategory = businessCategory.value;
                renderGroups();
            });

            document.getElementById("closeBusinessConfigBtn").addEventListener("click", closeBusinessConfig);
            document.getElementById("cancelBusinessConfigBtn").addEventListener("click", closeBusinessConfig);
            document.getElementById("confirmBusinessConfigBtn").addEventListener("click", confirmBusinessConfig);

            businessConfigModalMask.addEventListener("click", function (event) {
                if (event.target === businessConfigModalMask) {
                    closeBusinessConfig();
                }
            });

            document.addEventListener("click", function (event) {
                const target = event.target;
                if (!(target instanceof Element)) {
                    return;
                }
                const openSelect = algorithmParamGroupList.querySelector(".multi-select.open");
                if (openSelect instanceof Element && !openSelect.contains(target)) {
                    closeTalentTypeDropdown();
                }
            });

            const saveGlobalBtn = document.getElementById("saveGlobalBtn");
            const importBtn = document.getElementById("importBtn");
            const exportBtn = document.getElementById("exportBtn");

            if (saveGlobalBtn) {
                saveGlobalBtn.addEventListener("click", function () {
                    saveGlobal();
                });
            }

            if (exportBtn) {
                exportBtn.addEventListener("click", async function () {
                    await exportToMarkdown();
                });
            }

            if (importBtn) {
                importBtn.addEventListener("click", function () {
                    const input = document.createElement("input");
                    input.type = "file";
                    input.accept = ".md";
                    input.onchange = async function (e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = async function (event) {
                            const content = event.target.result;
                            try {
                                importFromMarkdown(content, { markDirty: false });
                                await saveMarkdownContent(content, currentMarkdownVersion, "Markdown 数据源已替换");
                            } catch (err) {
                                console.error(err);
                                handleMarkdownError(err, "导入失败");
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                });
            }

            function toChineseNumber(n) {
                const dict = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十"];
                return dict[n] || n;
            }

            async function exportToMarkdown() {
                try {
                    if (isDirty) {
                        await saveMarkdownContent(buildMarkdownContent(), currentMarkdownVersion, "配置已保存到 Markdown 数据源");
                    }
                    window.location.href = markdownApiUrl + "/export?t=" + Date.now();
                    setMessage("已从 Markdown 数据源导出", 2000);
                } catch (err) {
                    handleMarkdownError(err, "导出失败");
                }
            }

            function buildMarkdownContent() {
                const templateBtn = document.querySelector(".template-btn.active");
                const templateName = templateBtn ? templateBtn.querySelector(".tpl-name").textContent : "未知模板";

                const relatedPartyText = (relatedParty.selectedOptions && relatedParty.selectedOptions[0]) ? relatedParty.selectedOptions[0].text : "未选择";
                const taskUnitText = (taskUnit.selectedOptions && taskUnit.selectedOptions[0]) ? taskUnit.selectedOptions[0].text : "未选择";
                const appTaskText = (businessCategory.selectedOptions && businessCategory.selectedOptions[0]) ? businessCategory.selectedOptions[0].text : "未选择";

                let md = "";
                md += "模板：" + templateName + "\n\n";
                md += "一、业务：\n";
                md += relatedPartyText + "\\" + taskUnitText + "\\" + appTaskText + "\n\n";
                md += "输出形式：\n";
                md += "业务关联方：" + relatedPartyText + "\n";
                md += "业务单元：" + taskUnitText + "\n";
                md += "任务单元：" + appTaskText + "\n\n";

                md += "二、流程及要素内容\n";

                const catalogNodes = getVisibleCatalogNodes(getCatalogNodes());
                catalogNodes.forEach(function (node, nodeIdx) {
                    if (node.enabled === false) return;

                    md += "（" + toChineseNumber(nodeIdx + 1) + "） " + node.title + "\n";
                    node.items.forEach(function (item, itemIdx) {
                        var group = null;
                        var currentGroups = getCurrentGroups();
                        for (var i = 0; i < currentGroups.length; i++) {
                            if (currentGroups[i].id === item.groupId) {
                                group = currentGroups[i];
                                break;
                            }
                        }
                        if (group) {
                            md += (itemIdx + 1) + "、" + item.title + "：\n\n";
                            md += renderGroupToMarkdownTable(group);
                            md += "\n";
                        }
	                    });
	                });

                return md;
            }

            function renderGroupToMarkdownTable(group) {
                const rows = getVisibleRows(group);
                if (!rows.length) return "（暂无内容）\n";

                const hasObject = Object.prototype.hasOwnProperty.call(group.columns, "objectName");
                const groupTitle = group.displayTitle || group.title;
                const isContent = groupTitle === "内容" || groupTitle === "展示内容配置" || groupTitle.indexOf("内容") > -1;

                let header = "| 序号 |";
                if (hasObject) header += " " + group.columns.objectName + " |";
                header += " " + group.columns.formula + " | " + group.columns.description + " | 是否应用 |";
                if (!isContent) header += " 配置参数 |";
                header += "\n";

                let separator = "| --- |";
                if (hasObject) separator += " --- |";
                separator += " --- | --- | --- |";
                if (!isContent) separator += " --- |";
                separator += "\n";

                let rowsHtml = "";
                rows.forEach(function (row, idx) {
                    const isApplied = row.enabled === false ? "否" : "是";
                    const paramRows = isContent ? [] : getMarkdownParamRows(row, group);
                    const primaryCells = [idx + 1];
                    if (hasObject) primaryCells.push(row.objectName || "");
                    primaryCells.push(row.formula || "");
                    primaryCells.push(row.description || "");
                    primaryCells.push(isApplied);
                    if (!isContent) primaryCells.push(paramRows.length ? "见下级参数" : "无");
                    rowsHtml += renderMarkdownTableRow(primaryCells);

                    paramRows.forEach(function (paramRow, paramIdx) {
                        const secondaryCells = [(idx + 1) + "." + (paramIdx + 1)];
                        const standardText = paramRow.result ? "业务标准值：" + paramRow.result : "";
                        if (hasObject) {
                            secondaryCells.push("配置参数");
                            secondaryCells.push(paramRow.label);
                            secondaryCells.push(paramRow.selectedText ? "参数值：" + paramRow.selectedText : standardText);
                            secondaryCells.push("");
                            secondaryCells.push(standardText && paramRow.selectedText ? standardText : "");
                        } else {
                            secondaryCells.push("配置参数：" + paramRow.label);
                            secondaryCells.push(paramRow.selectedText ? "参数值：" + paramRow.selectedText : standardText);
                            secondaryCells.push("");
                            secondaryCells.push(standardText && paramRow.selectedText ? standardText : "");
                        }
                        rowsHtml += renderMarkdownTableRow(secondaryCells);
                    });
                });

                return header + separator + rowsHtml;
            }

            document.addEventListener("dblclick", function (event) {
                const target = event.target;
                if (!(target instanceof Element)) {
                    return;
                }
                const btn = target.closest(".template-btn[data-tpl-id]");
                if (btn) {
                    const tplId = btn.getAttribute("data-tpl-id");
                    startRenameTemplate(tplId);
                }
            });

            relatedParty.innerHTML = renderSelectOptions(relatedPartyOptions, "业务关联方");
            relatedParty.value = "";
            syncTaskUnitOptions();
            renderTemplates();
            renderGroups();
            loadMarkdownDataSource();

            function splitMarkdownTableRow(line) {
                const cells = [];
                let current = "";
                let escaped = false;
                let start = line.startsWith("|") ? 1 : 0;
                let end = line.endsWith("|") ? line.length - 1 : line.length;

                for (let i = start; i < end; i += 1) {
                    const char = line[i];
                    if (escaped) {
                        current += char;
                        escaped = false;
                        continue;
                    }
                    if (char === "\\") {
                        escaped = true;
                        continue;
                    }
                    if (char === "|") {
                        cells.push(current.trim());
                        current = "";
                        continue;
                    }
                    current += char;
                }
                cells.push(current.trim());
                return cells;
            }

            function importFromMarkdown(content, options) {
                const importOptions = options || {};
                const lines = content.split(/\r?\n/);
                let templateName = "";
                let businessPath = "";

                // 1. First pass: Parse Template & Business Path
                lines.forEach(function(line) {
                    if (line.startsWith("模板：")) {
                        templateName = line.substring(3).trim();
                    } else if (line.indexOf("\\") > -1 && line.indexOf("一、业务：") === -1 && line.indexOf("|") === -1) {
                        businessPath = line.trim();
                    }
                });

                // 2. Apply Template & Dropdowns first so getCurrentTask() is correct
                if (templateName) {
                    for (var i = 0; i < templates.length; i++) {
                        if (templates[i].name === templateName) {
                            activeTemplateId = templates[i].id;
                            break;
                        }
                    }
                }
                if (businessPath) {
                    const segments = businessPath.split("\\");
                    if (segments.length >= 3) {
                        setDropdownByText(relatedParty, segments[0]);
                        syncTaskUnitOptions();
                        setDropdownByText(taskUnit, segments[1]);
                        syncBusinessCategoryOptions();
                        setDropdownByText(businessCategory, segments[2]);
                    }
                }

                // 3. Second pass: Parse Tables with correct task context
                let currentNode = null;
                let currentElement = null;
                let columnMap = {};
                let currentPrimaryRowContext = null;
                const importedGroupRows = {};

                lines.forEach(function(line) {
                    if (line.match(/^（[一二三四五六七八九十]+）/)) {
                        const title = line.replace(/^（[一二三四五六七八九十]+）\s*/, "").trim();
                        currentNode = title;
                        currentPrimaryRowContext = null;
                    } else if (line.match(/^\d+、/)) {
                        currentElement = line.replace(/^\d+、/, "").replace(/：\s*$/, "").trim();
                        currentPrimaryRowContext = null;
                    } else if (line.startsWith("|")) {
                        const parts = splitMarkdownTableRow(line);
                        if (parts.length >= 3) {
                            if (parts[0] === "序号") {
                                columnMap = {};
                                parts.forEach(function(p, i) { columnMap[p] = i; });
                                touchImportedGroup(currentNode, currentElement, importedGroupRows);
                            } else if (!parts[0].match(/^-+$/)) {
                                if (/^\d+\.\d+/.test(parts[0] || "")) {
                                    updateParamFromMdRow(currentPrimaryRowContext, parts, columnMap);
                                } else {
                                    currentPrimaryRowContext = updateStoreFromMdRow(currentNode, currentElement, parts, columnMap, importedGroupRows);
                                }
                            }
                        }
                    }
                });

                applyImportedGroupRows(importedGroupRows);
                renderTemplates();
                renderGroups();
                if (importOptions.markDirty === false) {
                    markClean();
                } else {
                    markDirty();
                }
            }

            function setDropdownByText(select, text) {
                for (var i = 0; i < select.options.length; i++) {
                    if (select.options[i].text === text) {
                        select.selectedIndex = i;
                        select.dispatchEvent(new Event("change"));
                        break;
                    }
                }
            }

            function getImportedGroupBucket(group, importedGroupRows) {
                if (!group || !importedGroupRows) {
                    return null;
                }
                if (!importedGroupRows[group.id]) {
                    importedGroupRows[group.id] = {
                        group: group,
                        rows: []
                    };
                }
                return importedGroupRows[group.id];
            }

            function touchImportedGroup(nodeTitle, elementTitle, importedGroupRows) {
                const task = getCurrentTask();
                const group = findGroupByMarkdownContext(task, nodeTitle, elementTitle);
                getImportedGroupBucket(group, importedGroupRows);
            }

            function applyImportedGroupRows(importedGroupRows) {
                Object.keys(importedGroupRows).forEach(function (groupId) {
                    const bucket = importedGroupRows[groupId];
                    bucket.group.rows = bucket.rows;
                });
            }

            function updateStoreFromMdRow(nodeTitle, elementTitle, rowParts, columnMap, importedGroupRows) {
                const task = getCurrentTask();
                const rowNo = rowParts[0] || "";
                if (/^\d+\.\d+/.test(rowNo)) {
                    return null;
                }

                // Identify columns
                function getFirstColumn(keys) {
                    for (var keyIndex = 0; keyIndex < keys.length; keyIndex += 1) {
                        if (columnMap[keys[keyIndex]] !== undefined) {
                            return columnMap[keys[keyIndex]];
                        }
                    }
                    return undefined;
                }

                const formulaCol = getFirstColumn([
                    "属性名称",
                    "指标名称",
                    "公式",
                    "业务资格公式",
                    "额度计算公式",
                    "推送规则",
                    "风险配置",
                    "配置项",
                    "内容名称"
                ]);
                const enabledCol = getFirstColumn(["是否应用", "状态"]);
                const configCol = getFirstColumn(["配置参数", "参数"]);

                if (formulaCol === undefined || enabledCol === undefined) return;

                const formula = rowParts[formulaCol];
                const isApplied = rowParts[enabledCol] === "是";
                const configStr = rowParts[configCol];
                const targetGroup = findGroupByMarkdownContext(task, nodeTitle, elementTitle);
                const importedBucket = getImportedGroupBucket(targetGroup, importedGroupRows);

                if (targetGroup && importedBucket) {
                    const existingRow = findRowByFormula(targetGroup, formula);
                    const rowInStore = Object.assign({}, existingRow || {
                        id: targetGroup.id + "-md-" + String(rowNo || importedBucket.rows.length + 1).replace(/[^\w-]/g, "-"),
                        formula: formula,
                        enabled: true
                    });

                    rowInStore.formula = formula;
                    rowInStore.description = rowParts[columnMap[targetGroup.columns.description]] || rowInStore.description || "";
                    if (targetGroup.columns.objectName && columnMap[targetGroup.columns.objectName] !== undefined) {
                        rowInStore.objectName = rowParts[columnMap[targetGroup.columns.objectName]] || rowInStore.objectName || "";
                    }
                    rowInStore.enabled = isApplied;
                    if (configStr && configStr !== "无" && configStr !== "见下级参数") {
                        rowInStore.algorithmParams = parseMdConfigParams(configStr);
                    } else if (configStr === "见下级参数") {
                        rowInStore.algorithmParams = { groups: [] };
                    } else if (configStr === "无") {
                        delete rowInStore.algorithmParams;
                    }
                    importedBucket.rows.push(rowInStore);
                    return {
                        group: targetGroup,
                        row: rowInStore
                    };
                }
                return null;
            }

            function findGroupByMarkdownContext(task, nodeTitle, elementTitle) {
                const groups = getCurrentGroups();
                const nodeKey = findNodeKeyByTitle(task, nodeTitle);
                const genGroupId = "tq-generated-" + nodeKey + "-" + elementTitle;

                for (var i = 0; i < groups.length; i++) {
                    if (groups[i].id === genGroupId) {
                        return groups[i];
                    }
                }

                const resolvedTitle = getTqElementGroupTitle(nodeTitle, elementTitle);
                for (var j = 0; j < groups.length; j++) {
                    if (
                        groups[j].title === resolvedTitle
                        || groups[j].title === elementTitle
                        || groups[j].displayTitle === elementTitle
                    ) {
                        return groups[j];
                    }
                }
                return null;
            }

            function findRowByFormula(group, formula) {
                for (var i = 0; i < group.rows.length; i++) {
                    if (group.rows[i].formula === formula) {
                        return group.rows[i];
                    }
                }
                return null;
            }

            function stripCellPrefix(value, prefix) {
                return String(value || "").replace(new RegExp("^" + prefix + "[：:]\\s*"), "").trim();
            }

            function splitParamValues(value) {
                return String(value || "")
                    .split(/[、,，]/)
                    .map(function (item) { return item.trim(); })
                    .filter(Boolean);
            }

            function updateParamFromMdRow(context, rowParts, columnMap) {
                if (!context || !context.row) {
                    return;
                }

                const group = context.group;
                const formulaCol = columnMap[group.columns.formula];
                const descriptionCol = columnMap[group.columns.description];
                const configCol = columnMap["配置参数"] || columnMap["参数"];

                const label = stripCellPrefix(rowParts[formulaCol] || "", "配置参数");
                const selectedText = stripCellPrefix(rowParts[descriptionCol] || "", "参数值");
                const resultText = stripCellPrefix(configCol !== undefined ? rowParts[configCol] : "", "业务标准值");

                if (!context.row.algorithmParams || !Array.isArray(context.row.algorithmParams.groups)) {
                    context.row.algorithmParams = { groups: [] };
                }
                if (label) {
                    context.row.paramConfig = Object.assign({}, context.row.paramConfig || {}, {
                        label: label
                    });
                }
                context.row.algorithmParams.groups.push({
                    selectedValues: splitParamValues(selectedText),
                    result: resultText
                });
            }

            function findNodeKeyByTitle(task, title) {
                const mapping = taskCatalogMappings[task];
                if (mapping) {
                    for (var i = 0; i < mapping.nodes.length; i++) {
                        if (mapping.nodes[i].title === title) return mapping.nodes[i].key;
                    }
                }
                return title;
            }

            function parseMdConfigParams(text) {
                if (!text || text === "无") return null;
                const lines = text.split("<br>");
                const groups = lines.map(function(line) {
                    const resultParts = line.split(/业务标准值[：:]/);
                    const selectedPart = stripCellPrefix(resultParts[0] || line, "参数值");
                    return {
                        selectedValues: splitParamValues(selectedPart),
                        result: (resultParts[1] || "").trim()
                    };
                }).filter(function(g) { return g.selectedValues.length > 0; });
                return { groups: groups };
            }

            async function loadMarkdownDataSource() {
                try {
                    const response = await fetch(markdownApiUrl, {
                        headers: { "Accept": "application/json" }
                    });
                    if (!response.ok) {
                        throw new Error("HTTP " + response.status);
                    }
                    const payload = await response.json();
                    currentMarkdownVersion = payload.version || "";

                    if (payload.content && payload.content.indexOf("| 序号 |") > -1) {
                        importFromMarkdown(payload.content, { markDirty: false });
                        setMessage("已从 Markdown 数据源加载清册", 2200);
                        return;
                    }

                    await saveMarkdownContent(buildMarkdownContent(), currentMarkdownVersion, "已初始化 Markdown 数据源");
                } catch (err) {
                    console.error(err);
                    setMessage("Markdown 数据源加载失败，请确认本地服务已启动。", 4000);
                }
            }

            async function saveMarkdownContent(content, baseVersion, successMessage) {
                const response = await fetch(markdownApiUrl, {
                    method: "PUT",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        content: content,
                        baseVersion: baseVersion || ""
                    })
                });
                const payload = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    const err = new Error(payload.message || ("HTTP " + response.status));
                    err.status = response.status;
                    err.payload = payload;
                    throw err;
                }

                currentMarkdownVersion = payload.version || "";
                markClean();
                if (successMessage) {
                    setMessage(successMessage, 2200);
                }
                return payload;
            }

            function handleMarkdownError(err, fallbackText) {
                if (err && err.status === 409) {
                    setMessage("保存冲突：Markdown 文件已被其他人修改，请刷新后再合并。", 5000);
                    return;
                }
                setMessage(fallbackText + "：" + (err && err.message ? err.message : "未知错误"), 5000);
            }
        })();
    </script>
