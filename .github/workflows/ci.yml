name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check server syntax
        run: node --check server.js

      - name: Check HTML script syntax
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('任务项运行配置工具.html', 'utf8');
          const scripts = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)].map((match) => match[1]);
          for (const script of scripts) {
            new Function(script);
          }
          console.log(`Checked ${scripts.length} script block(s).`);
          NODE

      - name: Smoke test HTTP API
        run: |
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 2
          node <<'NODE'
          const http = require('node:http');

          function get(path) {
            return new Promise((resolve, reject) => {
              http.get({ hostname: '127.0.0.1', port: 18080, path }, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body }));
              }).on('error', reject);
            });
          }

          (async () => {
            const html = await get('/');
            if (html.status !== 200 || !html.body.includes('任务单元定义工具')) {
              throw new Error('HTML smoke test failed');
            }
            const config = await get('/api/config-md');
            const payload = JSON.parse(config.body);
            if (config.status !== 200 || !payload.version || !payload.content.includes('| 序号 |')) {
              throw new Error('Markdown API smoke test failed');
            }
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

  docker:
    runs-on: ubuntu-latest
    needs:
      - validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          EAST8_TIMESTAMP="$(TZ=Asia/Shanghai date +'%Y%m%d%H%M')"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          {
            echo "name=${IMAGE}"
            echo "east8_timestamp=${EAST8_TIMESTAMP}"
            echo "timestamp_tag=${IMAGE}:${EAST8_TIMESTAMP}"
            echo "sha_tag=${IMAGE}:${SHA_TAG}"
            echo "latest_tag=${IMAGE}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.image.outputs.east8_timestamp }}
            type=sha,prefix=sha-

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write image pull summary
        run: |
          {
            echo "## Docker 镜像"
            echo
            echo "| 项目 | 值 |"
            echo "| --- | --- |"
            echo "| 镜像 | \`${{ steps.image.outputs.name }}\` |"
            echo "| 东八区时间戳 | \`${{ steps.image.outputs.east8_timestamp }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest || '仅 PR 构建，无推送 digest' }}\` |"
            echo
            echo "### 拉取命令"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${{ steps.image.outputs.timestamp_tag }}"
            echo "docker pull ${{ steps.image.outputs.sha_tag }}"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "docker pull ${{ steps.image.outputs.latest_tag }}"
            fi
            echo "\`\`\`"
            echo
            echo "### 运行示例"
            echo
            echo "\`\`\`bash"
            echo "docker run --rm -p 18080:18080 ${{ steps.image.outputs.timestamp_tag }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
